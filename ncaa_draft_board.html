<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NCAA Snake Draft Grid</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 {
      margin-bottom: 5px;
    }
    .controls {
      margin: 10px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    button {
      padding: 6px 12px;
      cursor: pointer;
    }
    input[type="text"] {
      padding: 4px 8px;
    }
    table {
      border-collapse: collapse;
      background: #ffffff;
      margin-top: 10px;
    }
    th, td {
      border: 1px solid #444;
      width: 120px;
      height: 60px;
      text-align: center;
      vertical-align: middle;
    }
    th {
      background: #e0e0e0;
      font-weight: bold;
    }

    /* Player column colors */
    .player-header.p1 { background: #ffdddd; }
    .player-header.p2 { background: #ffeacc; }
    .player-header.p3 { background: #fff7cc; }
    .player-header.p4 { background: #e8ffcc; }
    .player-header.p5 { background: #d9f2ff; }
    .player-header.p6 { background: #e5d9ff; }
    .player-header.p7 { background: #ffd9f2; }
    .player-header.p8 { background: #f0f0f0; }

    select {
      width: 100%;
      font-size: 11px;
    }
  </style>
</head>
<body>

<h2>NCAA Snake Draft – Interactive Board</h2>

<div class="controls">
  <label>
    Team filter:
    <input type="text" id="teamFilter" placeholder="Type to filter teams..." />
  </label>
  <button id="resetBtn">Reset Board</button>
  <button id="saveJsonBtn">Save as JSON</button>
  <button id="saveCsvBtn">Save as CSV</button>
</div>

<table id="draftTable">
  <thead>
    <tr>
      <th></th>
      <th class="player-header p1" contenteditable="true">Player 1</th>
      <th class="player-header p2" contenteditable="true">Player 2</th>
      <th class="player-header p3" contenteditable="true">Player 3</th>
      <th class="player-header p4" contenteditable="true">Player 4</th>
      <th class="player-header p5" contenteditable="true">Player 5</th>
      <th class="player-header p6" contenteditable="true">Player 6</th>
      <th class="player-header p7" contenteditable="true">Player 7</th>
      <th class="player-header p8" contenteditable="true">Player 8</th>
    </tr>
  </thead>

  <tbody>
    <!-- 8 rounds × 8 players = 64 cells -->
    <tr><th>Round 1</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 2</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 3</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 4</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 5</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 6</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 7</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
    <tr><th>Round 8</th><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>
  </tbody>
</table>

<!-- Hidden template select -->
<select id="teamTemplate" style="display:none;">
  <option value="">Select team...</option>
  <option>Duke</option>
  <option>Michigan</option>
  <option>Arizona</option>
  <option>Florida</option>
  <option>Houston</option>
  <option>Iowa St.</option>
  <option>Gonzaga</option>
  <option>Illinois</option>
  <option>Purdue</option>
  <option>UConn</option>
  <option>Michigan St.</option>
  <option>Virginia</option>
  <option>Vanderbilt</option>
  <option>Nebraska</option>
  <option>Arkansas</option>
  <option>St. John's (NY)</option>
  <option>Louisville</option>
  <option>Alabama</option>
  <option>Texas Tech</option>
  <option>Tennessee</option>
  <option>Kansas</option>
  <option>Saint Mary's (CA)</option>
  <option>BYU</option>
  <option>UNC</option>
  <option>Wisconsin</option>
  <option>Utah St.</option>
  <option>Iowa</option>
  <option>Kentucky</option>
  <option>Ohio St.</option>
  <option>UCLA</option>
  <option>Saint Louis</option>
  <option>Miami (FL)</option>
  <option>Georgia</option>
  <option>Clemson</option>
  <option>Villanova</option>
  <option>NC State/Texas</option>
  <option>SMU/Miami OH</option>
  <option>TCU</option>
  <option>Santa Clara</option>
  <option>VCU</option>
  <option>Texas A&M</option>
  <option>South Fla.</option>
  <option>UCF</option>
  <option>Akron</option>
  <option>McNeese</option>
  <option>Missouri</option>
  <option>High Point</option>
  <option>Hawaii</option>
  <option>Troy</option>
  <option>Hofstra</option>
  <option>Northern Iowa</option>
  <option>California Baptist</option>
  <option>Tennessee St.</option>
  <option>Penn</option>
  <option>Wright St.</option>
  <option>North Dakota St.</option>
  <option>Queens (NC)</option>
  <option>Idaho</option>
  <option>Furman</option>
  <option>Kennesaw St.</option>
  <option>Lehigh/PVAMU</option>
  <option>Howard/UMB</option>
  <option>Long Island</option>
  <option>Siena</option>
</select>

<script>
  const teamStyles = {
    "Duke": { bg: "#003087", color: "#ffffff" },
    "Michigan": { bg: "#00274C", color: "#FFCB05" },
    "Arizona": { bg: "#CC0033", color: "#ffffff" },
    "Florida": { bg: "#FA4616", color: "#0021A5" },
    "Houston": { bg: "#C8102E", color: "#ffffff" },
    "Iowa St.": { bg: "#C8102E", color: "#F1BE48" },
    "Gonzaga": { bg: "#041E42", color: "#C8102E" },
    "Illinois": { bg: "#13294B", color: "#FF552E" },
    "Purdue": { bg: "#CEB888", color: "#000000" },
    "UConn": { bg: "#0C2340", color: "#ffffff" },
    "Michigan St.": { bg: "#18453B", color: "#ffffff" },
    "Virginia": { bg: "#232D4B", color: "#F84C1E" },
    "Vanderbilt": { bg: "#000000", color: "#C5B783" },
    "Nebraska": { bg: "#E41C38", color: "#ffffff" },
    "Arkansas": { bg: "#9D2235", color: "#ffffff" },
    "St. John's (NY)": { bg: "#D6001C", color: "#ffffff" },
    "Louisville": { bg: "#AD0000", color: "#ffffff" },
    "Alabama": { bg: "#9E1B32", color: "#ffffff" },
    "Texas Tech": { bg: "#CC0000", color: "#000000" },
    "Tennessee": { bg: "#FF8200", color: "#ffffff" },
    "Kansas": { bg: "#0051BA", color: "#E8000D" },
    "Saint Mary's (CA)": { bg: "#002855", color: "#BA0C2F" },
    "BYU": { bg: "#002255", color: "#ffffff" },
    "UNC": { bg: "#7BAFD4", color: "#13294B" },
    "Wisconsin": { bg: "#C5050C", color: "#ffffff" },
    "Utah St.": { bg: "#0F2439", color: "#ffffff" },
    "Iowa": { bg: "#000000", color: "#FFCD00" },
    "Kentucky": { bg: "#0033A0", color: "#ffffff" },
    "Ohio St.": { bg: "#BB0000", color: "#ffffff" },
    "UCLA": { bg: "#2774AE", color: "#FFD100" },
    "Saint Louis": { bg: "#003DA5", color: "#ffffff" },
    "Miami (FL)": { bg: "#005030", color: "#F47321" },
    "Georgia": { bg: "#BA0C2F", color: "#000000" },
    "Clemson": { bg: "#F56600", color: "#522D80" },
    "Villanova": { bg: "#003366", color: "#8DB9CA" },
    "NC State/Texas": { bg: "#CC0000", color: "#ffffff" },
    "SMU/Miami OH": { bg: "#CC0000", color: "#ffffff" },
    "TCU": { bg: "#4D1979", color: "#ffffff" },
    "Santa Clara": { bg: "#7C2529", color: "#ffffff" },
    "VCU": { bg: "#000000", color: "#FFC600" },
    "Texas A&M": { bg: "#500000", color: "#ffffff" },
    "South Fla.": { bg: "#006747", color: "#CFC493" },
    "UCF": { bg: "#000000", color: "#BA9B37" },
    "Akron": { bg: "#041E42", color: "#A89968" },
    "McNeese": { bg: "#00529B", color: "#FFC72C" },
    "Missouri": { bg: "#000000", color: "#F1B82D" },
    "High Point": { bg: "#4B2E83", color: "#ffffff" },
    "Hawaii": { bg: "#024731", color: "#ffffff" },
    "Troy": { bg: "#8A1538", color: "#ffffff" },
    "Hofstra": { bg: "#0033A0", color: "#FFC72C" },
    "Northern Iowa": { bg: "#4B116F", color: "#FFC72C" },
    "California Baptist": { bg: "#00205B", color: "#C99700" },
    "Tennessee St.": { bg: "#0033A0", color: "#ffffff" },
    "Penn": { bg: "#990000", color: "#011F5B" },
    "Wright St.": { bg: "#006747", color: "#FFC72C" },
    "North Dakota St.": { bg: "#115740", color: "#FFC72C" },
    "Queens (NC)": { bg: "#003057", color: "#C8102E" },
    "Idaho": { bg: "#B9975B", color: "#000000" },
    "Furman": { bg: "#4B306A", color: "#ffffff" },
    "Kennesaw St.": { bg: "#FFC72C", color: "#000000" },
    "Lehigh/PVAMU": { bg: "#6B4C3B", color: "#ffffff" },
    "Howard/UMB": { bg: "#002D62", color: "#ffffff" },
    "Long Island": { bg: "#0072CE", color: "#ffffff" },
    "Siena": { bg: "#006747", color: "#FFC72C" }
  };

  let draftedTeams = new Set();

  const table = document.getElementById('draftTable');
  const teamTemplate = document.getElementById('teamTemplate');
  const teamFilterInput = document.getElementById('teamFilter');

  function initBoard() {
    const cells = table.querySelectorAll('tbody td');
    cells.forEach(cell => {
      const select = teamTemplate.cloneNode(true);
      select.style.display = '';
      select.removeAttribute('id');

      select.addEventListener('change', () => {
        handlePickChange(cell, select);
      });

      cell.appendChild(select);
    });
  }

  function handlePickChange(cell, select) {
    const newTeam = select.value;
    const oldTeam = cell.dataset.team || "";

    if (newTeam === "") {
      return;
    }

    if (draftedTeams.has(newTeam)) {
      alert("This team has already been drafted.");
      select.value = "";
      return;
    }

    if (oldTeam) draftedTeams.delete(oldTeam);

    draftedTeams.add(newTeam);
    cell.dataset.team = newTeam;
    applyTeamStyle(cell, newTeam);

    // Refresh dropdowns so drafted team disappears from others
    refreshAllDropdowns();
  }

  function applyTeamStyle(cell, team) {
    cell.style.background = '';
    cell.style.color = '';

    if (!team) return;

    const style = teamStyles[team];
    if (style) {
      cell.style.background = style.bg;
      cell.style.color = style.color;
    }
  }

  function buildOptionsForSelect(currentValue, filterText) {
    const fragment = document.createDocumentFragment();
    const baseOptions = Array.from(teamTemplate.options);

    baseOptions.forEach(opt => {
      const value = opt.value;
      const text = opt.text;

      if (!value) {
        fragment.appendChild(opt.cloneNode(true));
        return;
      }

      const matchesFilter =
        !filterText ||
        text.toLowerCase().includes(filterText.toLowerCase());

      const isDrafted = draftedTeams.has(value);
      const isCurrent = currentValue === value;

      if (matchesFilter && (!isDrafted || isCurrent)) {
        const clone = opt.cloneNode(true);
        fragment.appendChild(clone);
      }
    });

    return fragment;
  }

  function applyTeamFilter(filterText) {
    const selects = table.querySelectorAll('tbody select');
    selects.forEach(select => {
      const currentValue = select.value;
      select.innerHTML = '';
      const fragment = buildOptionsForSelect(currentValue, filterText);
      select.appendChild(fragment);
      if (currentValue) {
        select.value = currentValue;
      }
    });
  }

  function refreshAllDropdowns() {
    const filterText = teamFilterInput.value || "";
    applyTeamFilter(filterText);
  }

  teamFilterInput.addEventListener('input', () => {
    applyTeamFilter(teamFilterInput.value || '');
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    draftedTeams.clear();
    const cells = table.querySelectorAll('tbody td');
    cells.forEach(cell => {
      const select = cell.querySelector('select');
      if (select) select.value = '';
      cell.dataset.team = "";
      cell.style.background = '';
      cell.style.color = '';
    });
    refreshAllDropdowns();
  });

  document.getElementById('saveJsonBtn').addEventListener('click', () => {
    const data = collectBoardData();
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    downloadBlob(blob, 'ncaa_draft_board.json');
  });

  document.getElementById('saveCsvBtn').addEventListener('click', () => {
    const data = collectBoardData();
    const csv = toCsv(data);
    const blob = new Blob([csv], { type: 'text/csv' });
    downloadBlob(blob, 'ncaa_draft_board.csv');
  });

  function collectBoardData() {
    const players = [];
    const headerCells = table.querySelectorAll('thead th');
    for (let i = 1; i < headerCells.length; i++) {
      players.push(headerCells[i].textContent.trim());
    }

    const rounds = [];
    const rows = table.querySelectorAll('tbody tr');
    rows.forEach(row => {
      const roundName = row.querySelector('th').textContent.trim();
      const picks = [];
      const cells = row.querySelectorAll('td');
      cells.forEach(cell => {
        const select = cell.querySelector('select');
        picks.push(select ? select.value : '');
      });
      rounds.push({ round: roundName, picks });
    });

    return { players, rounds };
  }

  function toCsv(data) {
    const lines = [];
    const header = ['Round', ...data.players];
    lines.push(header.join(','));
    data.rounds.forEach(r => {
      const row = [r.round, ...r.picks].map(v =>
        `"${String(v || '').replace(/"/g, '""')}"`
      );
      lines.push(row.join(','));
    });
    return lines.join('\n');
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    a.click();
    URL.revokeObjectURL(url);
  }

  initBoard();
  refreshAllDropdowns();
</script>

</body>
</html>
